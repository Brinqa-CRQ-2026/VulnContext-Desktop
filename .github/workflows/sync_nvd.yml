name: Weekly Sync (NVD)

on:
  schedule:
    - cron: "0 10 * * 1"   # every Monday at 10:00 UTC
  workflow_dispatch:
    inputs:
      smoke_test:
        description: "Run parser smoke test only, without uploading"
        required: false
        default: false
        type: boolean
      max_pages:
        description: "Optional page limit for manual testing; leave blank for full sync"
        required: false
        default: ""
      scores_only:
        description: "Only update CVSS score/severity, leaving descriptions unchanged"
        required: false
        default: true
        type: boolean
      batch_size:
        description: "Supabase upsert batch size"
        required: false
        default: "1000"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-weekly:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Debug environment
        run: |
          echo "PWD:"
          pwd
          echo "FILES:"
          ls -R
          echo "PYTHON:"
          which python3
          python3 --version

      - name: Run weekly sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.smoke_test }}" = "true" ]; then
            ARGS="$ARGS --smoke-test"
          fi
          if [ -n "${{ github.event.inputs.max_pages }}" ]; then
            ARGS="$ARGS --max-pages ${{ github.event.inputs.max_pages }}"
          fi
          if [ "${{ github.event.inputs.scores_only }}" = "true" ]; then
            ARGS="$ARGS --scores-only"
          fi
          if [ -n "${{ github.event.inputs.batch_size }}" ]; then
            ARGS="$ARGS --batch-size ${{ github.event.inputs.batch_size }}"
          fi
          python3 backend/scripts/automation/sync_nvd.py $ARGS
